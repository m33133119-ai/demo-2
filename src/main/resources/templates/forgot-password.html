<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>忘記密碼 - 卓越中古車</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">找回密碼</h2>
        
        <div th:if="${message}" class="mb-4 p-3 rounded bg-blue-50 text-blue-700 text-sm border-l-4 border-blue-500" th:text="${message}"></div>

        <form action="/reset-password" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">註冊姓名</label>
                <input type="text" name="name" required 
                       class="w-full border border-gray-300 p-2 rounded mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">註冊 Email</label>
                <input type="email" name="email" required 
                       class="w-full border border-gray-300 p-2 rounded mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">設定新密碼 (8位數字)</label>
                <input type="password" name="newPassword" required 
                       minlength="8" 
                       maxlength="8" 
                       pattern="\d{8}" 
                       inputmode="numeric"
                       title="請輸入剛好 8 位數字"
                       placeholder="請輸入 8 位數字"
                       class="w-full border border-gray-300 p-2 rounded mt-1 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-md transition transform active:scale-95">
                重設並儲存密碼
            </button>
        </form>
        
        <a href="/login" class="block text-center text-sm text-gray-500 mt-6 hover:underline">← 返回登入</a>
    </div>
</body>
</html>
