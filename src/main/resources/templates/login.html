<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登入 - 卓越中古車</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center px-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-50">
        
        <div class="text-center mb-8">
            <a th:href="@{/index}" class="text-3xl font-bold text-blue-600 tracking-tight hover:text-blue-700 transition">
                <i class="fas fa-car-side mr-2"></i>卓越中古車
            </a>
            <p class="text-gray-500 mt-2">歡迎回來，請登入您的帳號</p>
        </div>

        <div th:if="${message}" class="mb-6 p-4 rounded-lg bg-blue-50 border-l-4 border-blue-500 text-blue-700 flex items-center shadow-sm">
            <i class="fas fa-info-circle mr-3"></i>
            <span class="text-sm font-medium" th:text="${message}">這裡顯示動態訊息</span>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">帳號 (Email)</label>
                <div class="relative">
                    <input type="email" name="username" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                           placeholder="example@mail.com">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium text-gray-700">密碼</label>
                    <a th:href="@{/forgot-password}" class="text-xs text-blue-600 hover:underline">忘記密碼？</a>
                </div>
                <div class="relative">
                    <input type="password" name="password" required 
                           minlength="8" maxlength="8" pattern="\d{8}" inputmode="numeric"
                           title="請輸入 8 位數字密碼" placeholder="請輸入 8 位數字密碼"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transition transform active:scale-95">
                立即登入
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">或是</span>
            </div>
        </div>
        
        <div class="text-center text-sm text-gray-600">
            還沒有帳號嗎？ 
            <a th:href="@{/register}" class="text-blue-600 font-bold hover:underline ml-1">立即註冊</a>
        </div>
    </div>

</body>
</html>
