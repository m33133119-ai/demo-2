<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的預約 - 卓越中古車</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm mb-10">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a th:href="@{/index}" class="text-2xl font-bold text-blue-600">卓越中古車</a>
            <a th:href="@{/index}" class="text-gray-600 hover:text-blue-600 transition">
                <i class="fas fa-home mr-1"></i> 返回首頁
            </a>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-4xl">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-blue-600 px-8 py-6">
                <h1 class="text-2xl font-bold text-white flex items-center">
                    <i class="fas fa-calendar-alt mr-3"></i> 我的預約清單
                </h1>
                <p class="text-blue-100 mt-1">您目前所有的賞車預約紀錄</p>
            </div>

            <div class="p-0">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="px-8 py-4 text-sm font-semibold text-gray-600 uppercase">預約人姓名</th>
                            <th class="px-8 py-4 text-sm font-semibold text-gray-600 uppercase">預約車款</th>
                            <th class="px-8 py-4 text-sm font-semibold text-gray-600 uppercase">賞車日期</th>
                        </tr>
                    </thead>
					<tbody>
					    <tr th:each="res, iterStat : ${reservations}" class="border-b hover:bg-blue-50 transition text-center">
					        <td class="px-8 py-5 text-gray-800 font-medium text-left">
					            <i class="fas fa-user-circle mr-2 text-gray-400"></i>
					            <span th:text="${res.customerName}">姓名</span>
					        </td>
					        <td class="px-8 py-5">
					            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-bold" 
					                  th:text="${res.carName}">車名</span>
					        </td>
					        <td class="px-8 py-5 text-gray-600">
					            <i class="far fa-clock mr-2 text-gray-400"></i>
					            <span th:text="${res.date}">日期</span>
					        </td>
					        
					        <td class="px-8 py-5">
								<a th:href="@{/delete-reservation/{id}(id=${res.id})}" 
								   class="inline-flex items-center px-3 py-2 border border-transparent text-sm leading-4 font-medium rounded-md text-red-700 bg-red-100 hover:bg-red-200 focus:outline-none transition"
								   onclick="return confirm('確定要取消這筆賞車預約嗎？')">
								    <i class="fas fa-trash-alt mr-2"></i> 取消預約
								</a>
					        </td>
					    </tr>

					    <tr th:if="${#lists.isEmpty(reservations)}">
					        <td colspan="4" class="px-8 py-16 text-center text-gray-400">
					            <i class="fas fa-calendar-times text-5xl mb-4 block"></i>
					            <p class="text-lg">目前尚無預約紀錄</p>
					        </td>
					    </tr>
					</tbody>
                </table>
            </div>
        </div>

        <p class="text-center text-gray-400 text-sm mt-8">
            © 2026 卓越中古車管理系統 - 預約管理頁面
        </p>
    </div>

</body>
</html>
